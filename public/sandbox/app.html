<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0" />
    <title>Ephemera Sandbox</title>
    <style>
        * { box-sizing: border-box; }
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            color: #e8e8f0;
            background: transparent;
            overflow: auto;
        }
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --fg-primary: #e8e8f0;
            --fg-secondary: #9898a8;
            --fg-muted: #58586a;
            --accent: #00d4aa;
            --accent-hover: #00f0c0;
            --danger: #ff4d6a;
            --warning: #ffb84d;
            --border: rgba(255,255,255,0.08);
            --radius-sm: 6px;
            --radius-md: 12px;
        }
        #ephemera-sandbox-root { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="ephemera-sandbox-root"></div>
    <script src="./app.js"></script>
</body>
</html>
